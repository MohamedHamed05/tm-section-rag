name: tm-rag
services:
  # Qdrant Vector Store
  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: TM-qdrant-store
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - TM-qdrant_storage:/qdrant/storage
      - TM-qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  TM-qdrant_storage:
    driver: local
  TM-qdrant_snapshots:
    driver: local

networks:
  rag-network:
    name: tm_rag_network